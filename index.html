<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Permissions-Policy" content="interest-cohort=()">

    <title>Encriptador challenge</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <img src="header.png" alt="Logo del encriptador">
    </header>

    <main>

        <section class="seccion1">

            <div class="contenedorcajatexto">
                <textarea
                    placeholder="Ingrese su texto aquí"
                    class="cajatexto">
                </textarea>
            </div>

            <div class="alerta">
                <img src="alerta.png" alt="Alerta">
                <p>
                    Ingresar solamente letras minúsculas y sin acentos.
                </p>
            </div>

            <div class="contenedor-botones">
                <input type="button" class="btn-encriptar" value="Encriptar">

                <input type="button" class="btn-desencriptar" value="Desencriptar">
            </div>

        </section>

        <section class="seccion2">

            <div class="contenedormunieco">
                <img src="ranachallenge.png" alt="Ilustración rana">
            </div>

            <div class="contenedor-parrafo">
                <h3>
                    ¡Ningún mensaje fue encontrado!
                </h3>

                <p>
                    Ingresa el texto que desees encriptar o desencriptar.
                </p>
            </div>

            <div class="contenedor-copiar">
                <input type="button" class="btn-copiar" value="Copiar">
            </div>

            <div class="contenedor-resultado">
                <p class="texto-resultado"></p>
            </div>

            <div class="contenedor-github">
                <a href="https://github.com/lucaviq">
                    <img src="github.png" alt="GitHub">
                </a>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
