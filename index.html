<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encriptador LCV</title>

    <link rel="stylesheet" href="style.css?v=20">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <img src="header.png" alt="Logo">
    </header>

    <main>

        <!-- IZQUIERDA -->

        <section class="seccion1">

            <div class="contenedorcajatexto">

                <textarea
                    class="cajatexto"
                    placeholder="Ingrese su texto aquí">
                </textarea>

            </div>

            <div class="alerta">
                <img src="alerta.png" alt="Alerta">
                <p>
                    Solo letras minúsculas y sin acentos.
                </p>
            </div>

            <div class="contenedor-botones">

                <button class="btn-encriptar">
                    Encriptar
                </button>

                <button class="btn-desencriptar">
                    Desencriptar
                </button>

            </div>

        </section>

        <!-- DERECHA -->

        <section class="seccion2">

            <div class="contenedormunieco">
                <img src="ranachallenge.png" alt="Rana">
            </div>

            <div class="contenedor-parrafo">

                <h3>
                    Ningún mensaje encontrado
                </h3>

                <p>
                    Ingresa el texto que deseas encriptar o desencriptar.
                </p>

            </div>

            <div class="contenedor-resultado">

                <p class="texto-resultado"></p>

            </div>

            <div class="contenedor-copiar">

                <button class="btn-copiar">
                    Copiar
                </button>

            </div>

            <div class="contenedor-github">

                <a href="https://github.com/lucaviq" target="_blank">
                    <img src="github.png" alt="GitHub">
                </a>

            </div>

        </section>

    </main>

    <script src="script.js?v=20"></script>

</body>

</html>
